# Dedicated Postgres + pgvector for the RAG Chat Agent.
# Isolated from the existing ERP cluster (postgres_sql stack on port 5433).
services:
  rag_db:
    image: pgvector/pgvector:pg18
    container_name: rag_chat_db
    environment:
      - POSTGRES_DB=rag_chat
      - POSTGRES_USER=rag
      - POSTGRES_PASSWORD=rag_password
    ports:
      - "5434:5432" # host 5434 -> container 5432 (5433 is the ERP cluster)
    volumes:
      # PG18 images store data in a major-version subdir; mount the parent.
      - rag_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d rag_chat -U rag"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  rag_db_data:
